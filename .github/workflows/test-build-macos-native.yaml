name: test build macOS native

on:
  pull_request:
    branches:
      - main
      - JETSCAPE-4.0-RC
      - latessa/gtl_binary_function
  push:
    branches:
      - main
      - JETSCAPE-4.0-RC
      - latessa/gtl_binary_function

env:
  REPO_NAME: ${{ github.event.repository.name }}

jobs:
  build:
    name: external packages build
    runs-on: macos-latest

    steps:

    - name: brew install dependencies
      run: |
        NONINTERACTIVE=1 brew install --formula cmake doxygen root graph-tool hdf5 open-mpi gsl boost zlib
        . /opt/homebrew/bin/thisroot.sh

    - name: set environment variables
      run: |
        export ROOTSYS="/usr/local/root"
        export PATH="$ROOTSYS/bin:\$PATH"
        export LD_LIBRARY_PATH="$ROOTSYS/lib:$LD_LIBRARY_PATH"
        export PYTHONPATH="$ROOTSYS/lib"

    - name: install HepMC
      run: | # NONINTERACTIVE=1 brew tap davidchall/hep
        NONINTERACTIVE=1 brew install davidchall/hep/hepmc3@3.2.6-1

    - name: install Pythia
      run: |
        NONINTERACTIVE=1 brew install davidchall/hep/pythia@8.309

    - name: set more environment variables
      run: |
        username=jetscape-user
        export JETSCAPE_DIR="/home/${username}/JETSCAPE"
        export SMASH_DIR="${JETSCAPE_DIR}/external_packages/smash/smash_code"
        export EIGEN3_ROOT="/usr/include/eigen3"
        export PYTHIA8DIR="/usr/local/"
        export PYTHIA8="/usr/local/"
        export PYTHIA8_ROOT_DIR="/usr/local/"
        export PATH="$PATH:$PYTHIA8DIR/bin"
      
    - name: Checkout JETSCAPE Repository
      uses: actions/checkout@v4
      with:
        path: ${{ github.event.repository.name }}
        
    - name: Download MUSIC
      run: |
        cd ${GITHUB_WORKSPACE}/${REPO_NAME}/external_packages
        ./get_music.sh
    
    - name: Download ISS
      run: |
        cd ${GITHUB_WORKSPACE}/${REPO_NAME}/external_packages
        ./get_iSS.sh
    
    - name: Download FREESTREAM
      run: |
        cd ${GITHUB_WORKSPACE}/${REPO_NAME}/external_packages
        ./get_freestream-milne.sh

    - name: Download SMASH
      run: |
        cd ${GITHUB_WORKSPACE}/${REPO_NAME}/external_packages
        ./get_smash.sh

    - name: Build Application
      run: |
        cd ${GITHUB_WORKSPACE}/${REPO_NAME}
        mkdir build
        cd build
        export SMASH_DIR="${GITHUB_WORKSPACE}/${REPO_NAME}/external_packages/smash/smash_code"
        cmake .. -DUSE_MUSIC=ON -DUSE_ISS=ON -DUSE_FREESTREAM=ON -DUSE_SMASH=ON
        make -j2

    - name: Test Run
      run: |
        cd ${GITHUB_WORKSPACE}/${REPO_NAME}/build
        ./runJetscape ../config/publications_config/arXiv_1910.05481/jetscape_user_PP_1910.05481.xml
