name: test build macOS native

on:
  pull_request:
    branches:
      - main
      - JETSCAPE-4.0-RC
      - latessa/gtl_binary_function
  push:
    branches:
      - main
      - JETSCAPE-4.0-RC
      - latessa/gtl_binary_function

env:
  REPO_NAME: ${{ github.event.repository.name }}

jobs:
  build:
    name: external packages build
    runs-on: macos-latest

    steps:

    - name: brew install dependencies
      run: |
        NONINTERACTIVE=1 brew install --formula cmake doxygen root graph-tool hdf5 open-mpi gsl boost zlib
        . /opt/homebrew/bin/thisroot.sh

    - name: set environment variables
      run: |
        export ROOTSYS="/usr/local/root"
        export PATH="$ROOTSYS/bin:\$PATH"
        export LD_LIBRARY_PATH="$ROOTSYS/lib:$LD_LIBRARY_PATH"
        export PYTHONPATH="$ROOTSYS/lib"

    - name: install HepMC 3.2.6
      run: |
        curl https://hepmc.web.cern.ch/hepmc/releases/HepMC3-3.2.6.tar.gz
        tar -xvz HepMC3-3.2.6.tar.gz
        cd HepMC3-3.2.6/cmake
        cmake .. -DHEPMC3_ENABLE_ROOTIO=ON -DROOT_DIR=${ROOTSYS} -DHEPMC3_BUILD_EXAMPLES=ON
        make all install
        export LD_LIBRARY_PATH="/usr/local/lib:${LD_LIBRARY_PATH}"

    - name: install Pythia 8309
      run: |
        pythiaV="8309"
        curl -SLk http://pythia.org/download/pythia83/pythia${pythiaV}.tgz | tar -xvz -C /usr/local
        cd /usr/local/pythia${pythiaV}
        ./configure --enable-shared --prefix=/usr/local/ --with-hepmc3=/usr/local/HepMC3-3.2.6
        make all
        make all install

    - name: set more environment variables
      run: |
        username=jetscape-user
        export JETSCAPE_DIR="/home/${username}/JETSCAPE"
        export SMASH_DIR="${JETSCAPE_DIR}/external_packages/smash/smash_code"
        export EIGEN3_ROOT="/usr/include/eigen3"
        export PYTHIA8DIR="/usr/local/"
        export PYTHIA8="/usr/local/"
        export PYTHIA8_ROOT_DIR="/usr/local/"
        export PATH="$PATH:$PYTHIA8DIR/bin"


      
